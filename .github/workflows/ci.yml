name: Calculator UI Tests

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run automation suite (headless)
        run: mvn -B clean test -Dheadless=true -Dbrowser=chrome
        working-directory: automation

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts
          path: |
            automation/target/surefire-reports/**
            automation/target/screenshots/**
